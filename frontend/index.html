<!DOCTYPE html>
<html>
<head>
  <title>Skill Gap Analyzer</title>
  <style>
    body {
      font-family: "Comic Sans MS", "Segoe UI", sans-serif;
      background: #ffe6f2;
      color: #4a004f;
      text-align: center;
      padding: 40px;
    }
    .card {
      background: #fff0f7;
      border: 3px solid #ff99cc;
      border-radius: 20px;
      padding: 30px;
      max-width: 600px;
      margin: auto;
      box-shadow: 0 8px 20px rgba(255, 105, 180, 0.25);
    }
    h1 {
      color: #ff4fa3;
    }
    textarea {
      width: 90%;
      height: 120px;
      border-radius: 12px;
      border: 2px solid #ff99cc;
      padding: 10px;
      font-size: 16px;
      background: #fff;
    }
    button {
      margin-top: 15px;
      background: #ff4fa3;
      border: none;
      color: white;
      padding: 12px 24px;
      font-size: 16px;
      border-radius: 12px;
      cursor: pointer;
    }
    button:hover {
      background: #ff2b91;
    }
    .result-box {
      margin-top: 20px;
      background: #fff;
      border: 2px dashed #ff99cc;
      border-radius: 12px;
      padding: 15px;
      min-height: 40px;
      font-weight: bold;
      color: #d4006a;
    }
    .cartoon {
      font-size: 60px;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="cartoon">🦄✨</div>
    <h1>Skill Gap Analyzer</h1>
    <p>Paste your skills below:</p>

    <textarea id="skills" placeholder="e.g. python, sql, machine learning"></textarea><br>
    <button onclick="predict()">Predict</button>

    <div class="result-box" id="result">Your prediction will appear here 💖</div>
  </div>

  <script>
    async function predict() {
      const text = document.getElementById("skills").value;

      const res = await fetch("http://127.0.0.1:8000/predict", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text })
      });

      const data = await res.json();
      document.getElementById("result").innerText = "Prediction: " + data.prediction;
    }
  </script>

</body>
</html>
